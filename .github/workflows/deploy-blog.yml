name: Deploy blog to sameershanbhag.com/blogs

on:
  push:
    branches: [master]
    paths:
      - "blog/**"
      - ".github/workflows/deploy-blog.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blog-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blog/package-lock.json
      - run: npm ci
        working-directory: blog
      - run: npm run build
        working-directory: blog
      # Publish the static export into the blogs/ folder of the repo that
      # serves the apex domain. destination_dir scopes the deploy so the
      # portfolio at the repo root is left untouched.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: sameershanbhag/sameershanbhag.github.io
          publish_branch: master
          publish_dir: blog/out
          destination_dir: blogs
          commit_message: "blog: deploy ${{ github.sha }}"
